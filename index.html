/* ═══════════════════════════════════════════════════════════════
   COMPUTATION
═══════════════════════════════════════════════════════════════ */
function computeWorkloads(projects, team) {
  const loads = {};
  team.forEach(m => { loads[m.id] = { total:0, byProject:[] }; });
  projects.forEach(proj => {
    const mx = STATUS_MX[proj.status] ?? 0;
    Object.entries(proj.contributors).forEach(([mid, c]) => {
      if (!loads[mid]) return;
      const isDesignHold = c.designOnHold || false;
      const load = (c.isUpcoming || isDesignHold) ? 0 : Math.round(c.bl * mx);
      loads[mid].total += load;
      loads[mid].byProject.push({
        id:proj.id, name:proj.name, category:proj.category,
        load, type:c.type, effort:c.effort, status:proj.status,
        isHighLoad:proj.isHighLoad||false, isNew:proj.isNew||false,
        isUpcoming: c.isUpcoming || (mx===0 && proj.status!=='Closed'),
        isDesignHold,
      });
    });
  });
  return loads;
}

function getCategory(pct) {
  if (pct > 120) return 'overloaded';
  if (pct >= 70)  return 'optimal';
  return 'underutilized';
}
function getCatColor(cat) {
  return cat==='overloaded' ? T.overload : cat==='optimal' ? T.optimal : T.under;
}
function getCatLabel(cat) {
  return cat==='overloaded' ? 'Overloaded' : cat==='optimal' ? 'Optimal' : 'Underutilised';
}
function getAvailability(member, pct) {
  if (pct >= 100) return 'unavailable';
  if (pct >= 70)  return 'partial';
  return 'available';
}
function availColor(a)  { return a==='unavailable'?T.overload : a==='partial'?T.partial : T.avail; }
function availBg(a)     { return a==='unavailable'?T.overBg   : a==='partial'?T.partBg  : T.availBg; }
function availLabel(a)  { return a==='unavailable'?'Not Available' : a==='partial'?'Partially Available' : 'Available'; }

function getStatusColor(s) {
  const m = {
    'In Progress':'#4E7A5A', 'In Development':'#4E8A88',
    'In Review':'#C9A96E',   'In Sampling':'#7B6FAB',
    'In Production':'#5B7A99','Handover Pending':'#C4894A',
    'Stalled':'#B24B43',     'On Hold':'#ABA49C',
    'Delivered':'#7BAA8A',   'Closed':'#C8C4BE',
    'Active':'#4E7A5A','Slow':'#C9A96E','Production':'#5B7A99',
    'Small Task':'#7B6FAB','Research':'#4E8A88','Upcoming':'#7B8EA0',
  };
  return m[s] || T.text3;
}
function effortLabel(e) {
  const m = { none:'None', very_low:'Very Low', low:'Low', medium:'Moderate', high:'High', critical:'Critical' };
  return m[e] || e;
}
function effortColor(e) {
  const m = { none:T.text3, very_low:T.text3, low:T.text2, medium:T.accent, high:T.overload, critical:'#7B1F1F' };

}

function loadBarColor(pct) {

}
function genId(name) {
  return name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').slice(0,20) + '_' + Date.now().toString(36);
}

      onChange={e=>onChange(e.target.value)}
      style={{
        fontFamily:T.sans, fontSize:11, color:T.text1,
        background:T.surface, border:`1px solid ${T.border}`,

        ...style,

});

function IBtn({ onClick, title, children, danger, style={} }) {
  return (
    <button onClick={onClick} title={title} style={{
      background:'none', border:`1px solid ${danger?T.overload:T.border}`,
      borderRadius:3, padding:'2px 7px', cursor:'pointer',
      fontFamily:T.sans, fontSize:9, fontWeight:600,
      color: danger ? T.overload : T.text2,
      letterSpacing:'0.04em',
      transition:'opacity 0.15s',
      ...style,
    }}
    onMouseEnter={e=>e.currentTarget.style.opacity='0.65'}
    onMouseLeave={e=>e.currentTarget.style.opacity='1'}
    >{children}</button>
  );
}

function Label({ children, right }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
      <span style={{ fontFamily:T.sans, fontSize:9, fontWeight:600, letterSpacing:'0.2em', textTransform:'uppercase', color:T.text3 }}>
        {children}
      </span>
      {right && <span style={{ fontSize:9, color:T.text3, fontFamily:T.sans }}>{right}</span>}
    </div>
  );
}

function Bar({ pct, h=2 }) {
  const cap   = Math.min(pct, 100);
  const over  = Math.max(0, pct - 100);
  const color = loadBarColor(pct);
  return (
    <div style={{ width:'100%', height:h, background:T.borderHair, borderRadius:1, overflow:'hidden', display:'flex' }}>
      <div style={{ width:`${cap}%`, height:'100%', background:color, borderRadius:1, transition:'width 0.55s ease' }}/>
      {over > 0 && <div style={{ width:`${Math.min(over*0.4,15)}%`, height:'100%', background:T.overload, opacity:0.35 }}/>}
    </div>
  );
}

function AddMemberRow({ projId, team, currentIds, onAdd }) {
  const [mid,    setMid]    = useState('');
  const [type,   setType]   = useState('design_work');
  const [effort, setEffort] = useState('medium');
  const available = team.filter(m => !currentIds.includes(m.id));
  if (available.length === 0) return null;

  function commit() {
    if (!mid) return;
    onAdd(projId, mid, { type, effort, bl: EFFORT_BL[effort] || 20 });
    setMid('');
  }

  return (
    <div style={{ display:'flex', gap:6, alignItems:'center', marginTop:10, paddingTop:10, borderTop:`1px dashed ${T.borderHair}`, flexWrap:'wrap' }}>
      <Sel value={mid} options={[['','+ Person'], ...available.map(m=>[m.id, m.name.split(' ')[0]])]} onChange={setMid}/>
      <Sel value={type}   options={TYPE_OPTS}   onChange={setType}/>
      <Sel value={effort} options={EFFORT_OPTS} onChange={setEffort}/>
      <IBtn onClick={commit} style={{ background:T.accentBg, borderColor:T.accent, color:T.accent }}>Assign</IBtn>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ADD-PROJECT ROW  (edit mode — top of Project Index)
═══════════════════════════════════════════════════════════════ */
function AddProjectRow({ onAdd }) {
  const [open,   setOpen]   = useState(false);
  const [name,   setName]   = useState('');
  const [cat,    setCat]    = useState('');
  const [status, setStatus] = useState('Active');
  const ref = useRef();

  useEffect(() => { if (open && ref.current) ref.current.focus(); }, [open]);

  function commit() {
    if (!name.trim()) return;
    onAdd({
      id: genId(name),
      name: name.trim(),
      category: cat.trim() || 'General',
      status,
      contributors: {},
      assignedMembers: [],
    });
    setName(''); setCat(''); setStatus('Active'); setOpen(false);
  }

  if (!open) return (
    <button onClick={()=>setOpen(true)} style={{
      fontFamily:T.sans, fontSize:9, fontWeight:600, letterSpacing:'0.08em',
      textTransform:'uppercase', color:T.accent, background:T.accentBg,
      border:`1px solid ${T.accent}40`, borderRadius:4, padding:'5px 12px',
      cursor:'pointer', marginBottom:18, display:'block',
    }}>+ New Project</button>
  );

  return (
    <div style={{ padding:'14px 16px', background:T.accentBg, borderRadius:6, border:`1px solid ${T.accent}30`, marginBottom:16 }}>
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
        <TxtInput ref={ref} value={name} onChange={setName} placeholder="Project name" style={{ flex:1, minWidth:120 }}/>
        <TxtInput value={cat} onChange={setCat} placeholder="Category" style={{ flex:1, minWidth:100 }}/>
        <Sel value={status} options={STATUS_OPTS} onChange={setStatus}/>
        <IBtn onClick={commit} style={{ background:T.accent, borderColor:T.accent, color:'#fff' }}>Add</IBtn>
        <IBtn onClick={()=>setOpen(false)}>Cancel</IBtn>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MASTHEAD
═══════════════════════════════════════════════════════════════ */
function Masthead({ loads, view, setView, editMode, setEditMode, team, projects }) {
  const totalLoad = Object.values(loads).reduce((s,d)=>s+d.total, 0);
  const avgPct    = Math.round(totalLoad / (team.length * 100) * 100);
  const activeP   = projects.filter(p=>p.status==='Active').length;
  const availN    = team.filter(m => getAvailability(m, loads[m.id]?.total||0) === 'available').length;
  const overN     = team.filter(m => (loads[m.id]?.total||0) > 120).length;

  return (
    <header style={{
      position:'sticky', top:0, zIndex:100,
      background: editMode ? 'rgba(251,245,230,0.97)' : 'rgba(247,245,240,0.95)',
      backdropFilter:'blur(10px)',
      WebkitBackdropFilter:'blur(10px)',
      borderBottom:`1px solid ${editMode ? T.accent+'60' : T.border}`,
      transition:'background 0.2s, border-color 0.2s',
    }}>
      {editMode && (
        <div style={{ height:2, background:`linear-gradient(90deg, ${T.accent}, ${T.accent}40)` }}/>
      )}
      <div style={{
        maxWidth:1520, margin:'0 auto', padding:'0 48px',
        height:68, display:'flex', alignItems:'center', justifyContent:'space-between', gap:32,
      }}>

        <div style={{ flexShrink:0 }}>
          <div style={{ fontFamily:T.serif, fontSize:15, fontWeight:500, color:T.text1, letterSpacing:'0.01em' }}>
            Space at 9/2
          </div>
          <div style={{ fontFamily:T.sans, fontSize:8, letterSpacing:'0.2em', textTransform:'uppercase', color:T.text3, marginTop:2 }}>
            Resource Intelligence
          </div>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:28 }}>
          {[
            { val:`${avgPct}%`,  label:'Team Avg Load', serif:true },
            null,
            { val:availN,        label:'Available Now', color:T.avail },
            null,
            { val:overN,         label:'Overloaded', color:T.overload },
            null,
            { val:activeP,       label:'Active Projects' },
            null,
            { val:team.length,   label:'Team Size' },
          ].map((s,i) => s===null
            ? <div key={i} style={{ width:1, height:26, background:T.border }}/>
            : (
              <div key={i} style={{ textAlign:'center' }}>
                <div style={{
                  fontFamily:s.serif ? T.serif : T.sans,
                  fontSize:s.serif ? 24 : 17,
                  fontWeight:s.serif ? 500 : 700,
                  color:s.color||T.text1, lineHeight:1,
                }}>{s.val}</div>
                <div style={{ fontSize:8, color:T.text3, marginTop:3, letterSpacing:'0.1em', textTransform:'uppercase', fontFamily:T.sans }}>{s.label}</div>
              </div>
            )
          )}
        </div>

        <div style={{ display:'flex', gap:8, alignItems:'center', flexShrink:0 }}>
          {/* View toggle */}
          <div style={{ display:'flex', gap:2, padding:3, background:T.bgAlt, borderRadius:4, border:`1px solid ${T.border}` }}>
            {[['active','Active Work'],['assigned','All Assigned']].map(([v,l]) => (
              <button key={v} onClick={()=>setView(v)} style={{
                padding:'5px 14px', border:'none', borderRadius:3, cursor:'pointer',
                background:view===v ? T.surface : 'transparent',
                color:view===v ? T.text1 : T.text3,
                fontFamily:T.sans, fontSize:9, fontWeight:600,
                letterSpacing:'0.08em', textTransform:'uppercase',
                boxShadow:view===v ? '0 1px 4px rgba(0,0,0,0.07)' : 'none',
                transition:'all 0.15s',
              }}>{l}</button>
            ))}
          </div>

          {/* Edit mode toggle */}
          <button onClick={()=>{
            if (!editMode) {
              const code = window.prompt('Enter passcode to enable editing:');
              if (code !== 'dash2026') return;
            }
            setEditMode(e=>!e);
          }} style={{
            padding:'5px 14px', borderRadius:4, cursor:'pointer',
            background: editMode ? T.accent : T.bgAlt,
            color:      editMode ? '#fff'   : T.text2,
            border:     `1px solid ${editMode ? T.accent : T.border}`,
            fontFamily:T.sans, fontSize:9, fontWeight:700,
            letterSpacing:'0.1em', textTransform:'uppercase',

  );

                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                  <div>
                    <div style={{ display:'flex', alignItems:'center', gap:5, flexWrap:'wrap', marginBottom:2 }}>
                      <span style={{ fontFamily:T.sans, fontSize:13, fontWeight:600, color:T.text1 }}>{m.name}</span>
                      {m.isCritical && <Pill color={T.critical} bg={T.critBg}>Critical Resource</Pill>}
                    </div>
                    <div style={{ fontFamily:T.sans, fontSize:10, color:T.text3 }}>
                      {m.role} · {m.city}
                    </div>
                  </div>

                  <div style={{ display:'flex', alignItems:'flex-start', gap:10, flexShrink:0 }}>

                      <div style={{ fontFamily:T.serif, fontSize:24, fontWeight:500, color:catC, lineHeight:1 }}>{pct}%</div>
                      <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:600, color:availColor(avail), marginTop:3 }}>

                    </div>
                  </div>
                </div>

                <div style={{ margin:'9px 0 6px' }}><Bar pct={pct} h={2}/></div>

                <div style={{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>

                  {upcomingItems.length>0 && (

                              {inactive && <Pill color={T.overload} bg={T.overBg} size={7}>Inactive</Pill>}

                              textTransform:'uppercase', letterSpacing:'0.07em',

                          </div>

                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   PROJECT INDEX
═══════════════════════════════════════════════════════════════ */
function ProjectIndex({ projects, team, editMode, onUpdateProject, onUpdateContributor, onAddProject, onRemoveProject }) {
  const [exp, setExp] = useState(null);

  const sorted = [...projects].sort((a,b) => {
    const ord = {
      'In Progress':0,'In Development':1,'In Review':2,'In Sampling':3,
      'Handover Pending':4,'In Production':5,'Stalled':6,
      'On Hold':7,'Delivered':8,'Closed':9,
      'Active':0,'Slow':2,'Production':5,'Small Task':3,'Research':1,'Upcoming':7,
    };
    const la  = Object.values(a.contributors).reduce((s,c)=>s+Math.round(c.bl*(STATUS_MX[a.status]??0)),0);
    const lb  = Object.values(b.contributors).reduce((s,c)=>s+Math.round(c.bl*(STATUS_MX[b.status]??0)),0);
    const oa  = ord[a.status]??9, ob = ord[b.status]??9;
    return oa!==ob ? oa-ob : lb-la;
  });

  const catHue = (cat) => {
    if (cat==='Social Media') return T.sm;
    if (cat==='Internal' || cat==='Content') return T.rising;
    if (cat.includes('Website')) return T.under;
    if (cat.includes('Branding')) return T.accent;
    return T.text3;
  };

  return (
    <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:'28px 24px' }}>
      <Label right={`${projects.filter(p=>p.status==='Active').length} active · ${projects.filter(p=>p.isNew).length} new`}>
        Project Index
      </Label>

      {editMode && <AddProjectRow onAdd={onAddProject}/>}

      {sorted.map((proj, i) => {
        const mx        = STATUS_MX[proj.status] ?? 0;
        const load      = Object.values(proj.contributors).reduce((s,c)=>s+Math.round(c.bl*mx),0);
        const contribs  = Object.entries(proj.contributors);
        const isActive  = ['In Progress','In Development','In Review','In Sampling','In Production','Stalled','Handover Pending','Active','Slow','Production','Small Task','Research'].includes(proj.status);
        const isExp     = exp === proj.id;
        const sColor    = getStatusColor(proj.status);
        const last      = i===sorted.length-1;

        return (
          <div key={proj.id} style={{
            borderBottom:last?'none':`1px solid ${T.borderHair}`,
            paddingBottom:last?0:11, marginBottom:last?0:11,
            opacity: isActive ? 1 : 0.38,
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div
                style={{ flex:1, minWidth:0, cursor: isActive||editMode ? 'pointer' : 'default' }}
                onClick={() => (isActive||editMode) && setExp(isExp?null:proj.id)}
              >
                <div style={{ display:'flex', alignItems:'baseline', gap:7, flexWrap:'wrap' }}>
                  <span style={{ fontFamily:T.serif, fontSize:13, fontWeight:500, color:T.text1 }}>
                    {proj.name}
                  </span>
                  <span style={{ fontFamily:T.sans, fontSize:9, color:catHue(proj.category), flexShrink:0 }}>
                    {proj.category}
                  </span>
                  {proj.isHighLoad && <Pill color={T.overload} bg={T.overBg} size={7}>High Load</Pill>}
                  {proj.isNew      && <Pill color={T.sm}       bg={T.smBg}   size={7}>New</Pill>}
                  {proj.status==='Upcoming' && <Pill color={T.upcoming} bg={T.upBg} size={7}>Upcoming</Pill>}
                </div>
              </div>

              {/* Contributor avatar stack */}
              {contribs.length > 0 && !editMode && (
                <div
                  onClick={() => isActive && setExp(isExp?null:proj.id)}
                  style={{ display:'flex', flexShrink:0, cursor:isActive?'pointer':'default' }}
                >
                  {contribs.slice(0,4).map(([mid]) => {
                    const mem = team.find(t=>t.id===mid);
                    return (
                      <div key={mid} style={{
                        width:19, height:19, borderRadius:'50%', background:T.bgAlt,
                        border:`2px solid ${T.surface}`, marginLeft:-5,
                        display:'flex', alignItems:'center', justifyContent:'center',
                        fontSize:7, fontWeight:700, color:T.text2, fontFamily:T.sans,
                      }}>{mem?.name.charAt(0)||'?'}</div>
                    );
                  })}
                  {contribs.length>4 && (
                    <div style={{
                      width:19, height:19, borderRadius:'50%', background:T.bgAlt,
                      border:`2px solid ${T.surface}`, marginLeft:-5,
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:7, color:T.text3, fontFamily:T.sans,
                    }}>+{contribs.length-4}</div>
                  )}
                </div>
              )}

              <span
                onClick={() => (isActive||editMode) && setExp(isExp?null:proj.id)}
                style={{ fontFamily:T.sans, fontSize:11, fontWeight:700, color:T.text2, minWidth:24, textAlign:'right', fontVariantNumeric:'tabular-nums', flexShrink:0, cursor:isActive?'pointer':'default' }}
              >{load}</span>

              {/* Status — editable dropdown in edit mode */}
              {editMode ? (
                <Sel
                  value={proj.status}
                  options={STATUS_OPTS}
                  onChange={val => onUpdateProject(proj.id, { status: val })}
                  style={{ flexShrink:0 }}
                />
              ) : (
                <span
                  onClick={() => isActive && setExp(isExp?null:proj.id)}
                  style={{ fontFamily:T.sans, fontSize:7, fontWeight:800, padding:'2px 8px', borderRadius:2, textTransform:'uppercase', letterSpacing:'0.08em', color:sColor, background:sColor+'16', flexShrink:0, minWidth:52, textAlign:'center', cursor:isActive?'pointer':'default' }}
                >{proj.status}</span>
              )}
            </div>

            {/* Expanded — view mode */}
            {isExp && !editMode && (
              <div style={{ marginTop:9, padding:'11px 13px', background:T.bg, borderRadius:5, border:`1px solid ${T.borderHair}` }}>
                {contribs.map(([mid, c]) => {
                  const mem  = team.find(t=>t.id===mid);
                  const cld  = c.isUpcoming ? 0 : Math.round(c.bl*(STATUS_MX[proj.status]??0));
                  return (
                    <div key={mid} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <span style={{ fontFamily:T.sans, fontSize:9, fontWeight:700, color:effortColor(c.effort) }}>
                          {effortLabel(c.effort)}
                        </span>
                        <span style={{ fontFamily:T.sans, fontSize:11, color:T.text1 }}>{mem?.name}</span>
                        <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3 }}>{typeLabel(c.type)}</span>
                        {c.isUpcoming && <Pill color={T.upcoming} bg={T.upBg} size={7}>Upcoming</Pill>}
                      </div>
                      <span style={{ fontFamily:T.sans, fontSize:10, fontWeight:600, color:T.text2 }}>
                        {c.isUpcoming ? '—' : `+${cld}`}
                      </span>
                    </div>
                  );
                })}
                {proj.notActive?.length>0 && (
                  <div style={{ fontFamily:T.sans, fontSize:9, color:T.text3, marginTop:6, fontStyle:'italic' }}>
                    Assigned but inactive: {proj.notActive.map(id=>team.find(t=>t.id===id)?.name.split(' ')[0]).join(', ')}
                  </div>
                )}
              </div>
            )}

            {/* Expanded — edit mode */}
            {isExp && editMode && (
              <div style={{ marginTop:9, padding:'14px 16px', background:T.accentBg, borderRadius:5, border:`1px solid ${T.accent}25` }}>

                {/* Contributors with effort controls */}
                {contribs.length > 0 && (
                  <div style={{ marginBottom:8 }}>
                    <div style={{ fontFamily:T.sans, fontSize:8, color:T.text3, letterSpacing:'0.14em', textTransform:'uppercase', marginBottom:10 }}>
                      Contributors
                    </div>
                    {contribs.map(([mid, c]) => {
                      const mem = team.find(t=>t.id===mid);
                      const cld = c.isUpcoming || c.designOnHold ? 0 : Math.round(c.bl*(STATUS_MX[proj.status]??0));
                      return (
                        <div key={mid} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:7, gap:8 }}>
                          <span style={{ fontFamily:T.sans, fontSize:11, fontWeight:600, color:T.text1, flex:1, minWidth:0 }}>
                            {mem?.name.split(' ')[0]}
                            <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3, fontWeight:400, marginLeft:6 }}>{typeLabel(c.type)}</span>
                          </span>
                          <div style={{ display:'flex', gap:6, alignItems:'center', flexShrink:0 }}>
                            <Sel
                              value={c.type}
                              options={TYPE_OPTS}
                              onChange={val => onUpdateContributor(proj.id, mid, { type: val })}
                            />
                            <Sel
                              value={c.effort}
                              options={EFFORT_OPTS}
                              onChange={val => onUpdateContributor(proj.id, mid, { effort: val, bl: EFFORT_BL[val] ?? c.bl })}
                            />
                            <span style={{ fontFamily:T.sans, fontSize:10, fontWeight:700, color:T.text2, minWidth:28, textAlign:'right' }}>
                              {cld > 0 ? `+${cld}` : '—'}
                            </span>
                            <IBtn
                              onClick={()=>onUpdateContributor(proj.id, mid, null)}
                              danger title="Remove from project"
                            >×</IBtn>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Add member */}
                <AddMemberRow
                  projId={proj.id}
                  team={team}
                  currentIds={contribs.map(([id])=>id)}
                  onAdd={onUpdateContributor}
                />

                {/* Remove project */}
                <div style={{ marginTop:14, paddingTop:12, borderTop:`1px dashed ${T.border}`, display:'flex', justifyContent:'flex-end' }}>
                  <IBtn
                    onClick={()=>{ if(window.confirm(`Remove "${proj.name}"?`)) { onRemoveProject(proj.id); setExp(null); } }}
                    danger
                  >Remove Project</IBtn>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ALLOCATION PANEL
═══════════════════════════════════════════════════════════════ */
function AllocationPanel({ loads, team, projects }) {
  const withAvail = team.map(m => ({
    ...m,
    pct:   Math.min(loads[m.id]?.total||0, 150),
    avail: getAvailability(m, loads[m.id]?.total||0),
  }));

  const available  = withAvail.filter(m=>m.avail==='available').sort((a,b)=>a.pct-b.pct);
  const partial    = withAvail.filter(m=>m.avail==='partial').sort((a,b)=>b.pct-a.pct);
  const overloaded = withAvail.filter(m=>m.avail==='unavailable').sort((a,b)=>b.pct-a.pct);

  const pragatiTotal = loads['pragati']?.total || 0;
  const pragatiInt   = (loads['pragati']?.byProject||[]).filter(p=>['bd','finance','borrowed_sm'].includes(p.id)).reduce((s,p)=>s+p.load,0);

  const flags = [
    {
      label:'Finance — Single Point of Failure',
      body:`Finance runs entirely through Pragati. Invoicing, PnL, forecasting, and scope negotiations have no backup or delegation path. ${pragatiInt > 0 ? `Internal work represents ${Math.round((pragatiInt/pragatiTotal)*100)}% of her ${pragatiTotal}% total load.` : ''} This is the studio's highest structural risk.`,
    },
    {
      label:'Borrowed Earth AI Gen — Design Bandwidth at Risk',
      body:'Disha and Shruti are the sole design contributors on this project at HIGH intensity. Bombaim (Disha) and Dev Ratnam (Shruti) also remain active — there is no design backup available within the current team.',
    },
    {
      label:'Leadership Touch — Anahita Across All Active Projects',
      body:`Anahita holds lightweight oversight or content roles across every active project at ${loads['anahita']?.total||0}% total load. Individually each touchpoint is minimal, but founder sign-off across 10+ streams remains a soft bottleneck if volume increases.`,
    },
    {
      label:'Odyssey — Research Phase Active',
      body:'Odyssey has entered Research phase with Anushka as the sole active contributor at Medium effort. Meghna is assigned but design work is on hold — she will activate when the brief moves to production. Sakhi remains assigned but inactive.',
    },
  ];

  const colHead = (label, color) => (
    <div style={{ fontFamily:T.sans, fontSize:9, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color, marginBottom:14 }}>
      {label}
    </div>
  );

  const memberRow = (m, note) => (
    <div key={m.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
      <div>
        <div style={{ fontFamily:T.sans, fontSize:12, fontWeight:600, color:T.text1 }}>{m.name.split(' ')[0]}</div>
        <div style={{ fontFamily:T.sans, fontSize:9, color:T.text3, marginTop:1 }}>{m.role.replace('Senior ','Sr. ').replace('Mid-Level ','Mid ')}</div>
        {note && <div style={{ fontFamily:T.sans, fontSize:9, color:T.text3, fontStyle:'italic' }}>{note}</div>}
      </div>
      <div style={{ textAlign:'right' }}>
        <div style={{ fontFamily:T.serif, fontSize:19, fontWeight:500, color:getCatColor(getCategory(m.pct)), lineHeight:1 }}>{m.pct}%</div>
        <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, color:availColor(m.avail), marginTop:2, textTransform:'uppercase', letterSpacing:'0.06em' }}>
          {availLabel(m.avail)}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:'28px 24px' }}>
      <Label>Allocation Status</Label>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:20, marginBottom:28 }}>
        <div style={{ padding:'16px 16px', background:T.availBg, borderRadius:6, border:`1px solid ${T.avail}18` }}>
          {colHead('Available for New Work', T.avail)}
          {available.length===0
            ? <div style={{ fontFamily:T.sans, fontSize:11, color:T.text3 }}>None at this time</div>
            : available.map(m => memberRow(m))}
        </div>

        <div style={{ padding:'16px 16px', background:T.partBg, borderRadius:6, border:`1px solid ${T.partial}18` }}>
          {colHead('Partially Available', T.partial)}
          {partial.length===0
            ? <div style={{ fontFamily:T.sans, fontSize:11, color:T.text3 }}>None at this time</div>
            : partial.map(m => memberRow(m))}
        </div>

        <div style={{ padding:'16px 16px', background:T.overBg, borderRadius:6, border:`1px solid ${T.overload}18` }}>
          {colHead('At / Over Capacity', T.overload)}
          {overloaded.length===0
            ? <div style={{ fontFamily:T.sans, fontSize:11, color:T.text3 }}>None at this time</div>
            : overloaded.map(m => memberRow(m, m.pct > 120 ? 'Over capacity' : 'At capacity — no new work'))}
        </div>
      </div>

      <div style={{ borderTop:`1px solid ${T.borderHair}`, paddingTop:22 }}>
        <div style={{ fontFamily:T.sans, fontSize:9, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:T.text3, marginBottom:18 }}>
          Dependency Map
        </div>

        {flags.map((f, i) => (
          <div key={i} style={{
            paddingBottom:i<flags.length-1?18:0,
            marginBottom:i<flags.length-1?18:0,
            borderBottom:i<flags.length-1?`1px solid ${T.borderHair}`:'none',
          }}>
            <div style={{ fontFamily:T.serif, fontSize:14, fontWeight:500, color:T.text1, marginBottom:6, lineHeight:1.4 }}>
              {f.label}
            </div>
            <div style={{ fontFamily:T.sans, fontSize:11, color:T.text2, lineHeight:1.75, maxWidth:540 }}>
              {f.body}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT  — JSONbin-backed state (localStorage fallback)
═══════════════════════════════════════════════════════════════ */
function App() {
  const [view,     setView]     = useState('active');
  const [editMode, setEditMode] = useState(false);
  const [loading,  setLoading]  = useState(JSONBIN_OK);
  const [projects, setProjects] = useState(INITIAL_PROJECTS);
  const [team,     setTeam]     = useState(INITIAL_TEAM);
  const canSave = useRef(false); // gates saves until after initial load

  /* ── load from JSONbin on mount ────────────────────────────── */
  useEffect(() => {
    if (!JSONBIN_OK) {
      // No JSONbin — fall back to localStorage
      try {
        const v = localStorage.getItem('s92_version');
        const p = localStorage.getItem('s92_projects');
        const t = localStorage.getItem('s92_team');
        if (p && v === String(DATA_VERSION)) setProjects(JSON.parse(p));
        if (t && v === String(DATA_VERSION)) setTeam(JSON.parse(t));
      } catch {}
      canSave.current = true;
      return;
    }
    (async () => {
      try {
        const res = await fetch(
          `https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,
          { headers: { 'X-Master-Key': JSONBIN_KEY } }
        );
        if (res.ok) {
          const { record } = await res.json();
          if (record.projects?.length) setProjects(record.projects);
          if (record.team?.length)     setTeam(record.team);
        }
      } catch {}
      setLoading(false);
      canSave.current = true;
    })();
  }, []);

  /* ── save to JSONbin + localStorage on every change ─────────── */
  useEffect(() => {
    if (!canSave.current) return;
    // localStorage (always)
    try {
      localStorage.setItem('s92_version',  String(DATA_VERSION));
      localStorage.setItem('s92_projects', JSON.stringify(projects));
      localStorage.setItem('s92_team',     JSON.stringify(team));
    } catch {}
    // JSONbin (if configured)
    if (!JSONBIN_OK) return;
    fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body:    JSON.stringify({ version: DATA_VERSION, projects, team }),
    }).catch(() => {});
  }, [projects, team]);

  const loads = useMemo(() => computeWorkloads(projects, team), [projects, team]);

  /* ── mutations ─────────────────────────────────────────────── */
  function updateProject(id, patch) {
    setProjects(ps => ps.map(p => p.id===id ? {...p,...patch} : p));
  }
  function updateContributor(projId, memberId, patch) {
    setProjects(ps => ps.map(p => {
      if (p.id !== projId) return p;
      const c = { ...p.contributors };
      if (patch === null) {
        delete c[memberId];
        return { ...p, contributors:c, assignedMembers:(p.assignedMembers||[]).filter(id=>id!==memberId) };
      }
      c[memberId] = { ...(c[memberId]||{}), ...patch };
      const am = (p.assignedMembers||[]).includes(memberId)
        ? p.assignedMembers : [...(p.assignedMembers||[]), memberId];
      return { ...p, contributors:c, assignedMembers:am };
    }));
  }
  function addProject(proj)  { setProjects(ps => [...ps, proj]); }
  function removeProject(id) { setProjects(ps => ps.filter(p => p.id!==id)); }
  function resetToDefaults() {
    if (window.confirm('Reset all data to defaults? This cannot be undone.')) {
      setProjects(INITIAL_PROJECTS);
      setTeam(INITIAL_TEAM);
    }
  }

  if (loading) return (
    <div style={{ minHeight:'100vh', background:'#FFFFFF', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:28 }}>
      {/* Logo */}
      {(() => {
        const box = { border:'1.5px solid #12152A', padding:'11px 18px', display:'inline-flex', alignItems:'center', justifyContent:'center' };
        const lbl = { fontFamily:"'Inter',-apple-system,sans-serif", fontWeight:600, fontSize:13, letterSpacing:'0.26em', color:'#12152A' };
        return (
          <div style={{ display:'inline-flex', flexDirection:'column', alignItems:'flex-start', gap:5 }}>
            <div style={box}><span style={lbl}>THE</span></div>
            <div style={{ display:'flex', gap:5 }}>
              <div style={box}><span style={lbl}>SPACE</span></div>
              <div style={box}><span style={lbl}>AT</span></div>
            </div>
            <div style={{ alignSelf:'stretch', display:'flex', justifyContent:'center' }}>
              <div style={box}><span style={lbl}>9/2</span></div>
            </div>
          </div>
        );
      })()}
      <div style={{ fontFamily:T.sans, fontSize:9, fontWeight:600, letterSpacing:'0.22em', textTransform:'uppercase', color:'#ABA49C' }}>
        Resource Intelligence Dashboard
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:'100vh', background:T.bg, paddingBottom:8 }}>
      <Masthead
        loads={loads} view={view} setView={setView}
        editMode={editMode} setEditMode={setEditMode}
        team={team} projects={projects}
      />
      <OverviewStrip loads={loads} team={team}/>

      <div style={{
        maxWidth:1520, margin:'0 auto', padding:'20px 48px',
        display:'grid', gridTemplateColumns:'368px 1fr', gap:20, alignItems:'start',
      }}>
        <TeamWorkload
          loads={loads} view={view} team={team} projects={projects}
          editMode={editMode}
        />
        <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
          <ProjectIndex
            projects={projects} team={team}
            editMode={editMode}
            onUpdateProject={updateProject}
            onUpdateContributor={updateContributor}
            onAddProject={addProject}
            onRemoveProject={removeProject}
          />
          <AllocationPanel loads={loads} team={team} projects={projects}/>
        </div>
      </div>

      {editMode && (
        <div style={{ maxWidth:1520, margin:'0 auto', padding:'0 48px 8px', display:'flex', justifyContent:'flex-end' }}>
          <button onClick={resetToDefaults} style={{
            fontFamily:T.sans, fontSize:9, color:T.text3,
            background:'none', border:'none', cursor:'pointer',
            textDecoration:'underline', letterSpacing:'0.06em', padding:'4px 0',
          }}>Reset to defaults</button>
        </div>
      )}
      <TokensFooter/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
